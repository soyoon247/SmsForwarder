name: Build & Release APK

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set version info
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION_NAME="${TAG#v}"
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SmsForwarder-${{ steps.version.outputs.version_name }}.apk

      - name: Push source to public repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/soyoon247/SmsForwarder.git
          git checkout -b release
          git merge --squash main
          git commit -m "${{ github.ref_name }} release"
          git push public release:main --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: soyoon247/SmsForwarder
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: "SmsForwarder ${{ steps.version.outputs.version_name }}"
          body: |
            ## 설치 방법
            1. 아래 APK 파일을 다운로드합니다.
            2. 안드로이드 설정 → **알 수 없는 출처의 앱 설치** 허용
            3. 다운로드된 APK를 실행하여 설치합니다.

            ---

            ## 정상 동작을 위한 설정

            일부 기기에서 SMS 수신이 제한될 수 있습니다. 앱 설치 후 아래 설정을 확인하세요.

            ### 한국어
            1. **배터리 최적화 해제**
               설정 → 앱 → 해당 앱 → 배터리 → "제한 없음" 선택
            2. **사용하지 않는 앱 관리 해제**
               설정 → 앱 → 해당 앱 → "사용하지 않는 앱 관리" 토글 끄기
            3. **자동 절전 예외 앱 등록**
               설정 → 배터리 → 백그라운드 앱 사용 제한 → "자동 절전 예외 앱"에 해당 앱 추가

            ### English
            1. **Disable Battery Optimization**
               Settings → Apps → Select the app → Battery → Choose "Unrestricted"
            2. **Disable Manage app if unused**
               Settings → Apps → Select the app → Turn off "Remove permissions if app is unused"
            3. **Add to Never auto sleeping apps**
               Settings → Battery → Background usage limits → Add the app to "Never auto sleeping apps"

            ---
            **버전:** ${{ steps.version.outputs.version_name }}
            **빌드 번호:** ${{ steps.version.outputs.version_code }}
            **커밋:** ${{ github.sha }}
          files: app/build/outputs/apk/release/SmsForwarder-${{ steps.version.outputs.version_name }}.apk
          generate_release_notes: true
