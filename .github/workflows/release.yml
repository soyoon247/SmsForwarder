name: Build & Release APK

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set version info
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION_NAME="${TAG#v}"
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SmsForwarder-${{ steps.version.outputs.version_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SmsForwarder ${{ steps.version.outputs.version_name }}"
          body: |
            ## 설치 방법
            1. 아래 APK 파일을 다운로드합니다.
            2. 안드로이드 설정 → **알 수 없는 출처의 앱 설치** 허용
            3. 다운로드된 APK를 실행하여 설치합니다.

            ---
            **버전:** ${{ steps.version.outputs.version_name }}
            **빌드 번호:** ${{ steps.version.outputs.version_code }}
            **커밋:** ${{ github.sha }}
          files: app/build/outputs/apk/release/SmsForwarder-${{ steps.version.outputs.version_name }}.apk
          generate_release_notes: true
